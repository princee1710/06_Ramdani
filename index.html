<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Modular UI</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
  }

  h1 { margin-bottom: 20px; }

  nav {
    background: rgba(255,255,255,0.05);
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  nav a {
    margin-right: 20px;
    color: #94a3b8;
    cursor: pointer;
  }

  nav a.active {
    color: #38bdf8;
    font-weight: bold;
  }

  section {
    background: rgba(255,255,255,0.03);
    padding: 15px;
    border-radius: 16px;
  }

  input {
    padding: 8px;
    margin-right: 10px;
    border-radius: 6px;
    border: none;
  }

  button {
    padding: 8px 12px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: black;
    font-weight: bold;
  }

  button:hover {
    background: #0ea5e9;
  }

  .form {
    margin-bottom: 15px;
  }

  /* CARD */
  .flex {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
  }

  .card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 16px;
    width: 180px;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.05);
  }

  th, td { padding: 10px; }

  th {
    background: rgba(255,255,255,0.1);
  }

  ul { list-style: none; }

  li {
    padding: 8px;
    background: rgba(255,255,255,0.05);
    margin-bottom: 5px;
    border-radius: 6px;
  }

  pre {
    background: #020617;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    color: #38bdf8;
  }
</style>
</head>

<body>

<h1>🚀 Modular UI + CRUD</h1>

<nav id="menu"></nav>
<section id="content"></section>

<script>
  // =======================
  // DATA
  // =======================
  let users = [
    { id: 1, name: "Ramdani", role: "Frontend" },
    { id: 2, name: "Budi", role: "Backend" },
    { id: 3, name: "Siti", role: "UI/UX" }
  ];

  const menuItems = ["Array", "Table", "Card", "List"];

  // =======================
  // COMPONENTS
  // =======================

  const renderMenu = () =>
    menuItems.map(item =>
      `<a onclick="navigate('${item}')" id="menu-${item}">${item}</a>`
    ).join("");

  const renderArray = data => `
    <h2>📦 Array</h2>
    <pre>${JSON.stringify(data, null, 2)}</pre>
  `;

  const renderTable = data => `
    <h2>📊 Table</h2>

    <div class="form">
      <input type="text" id="nameInput" placeholder="Nama">
      <input type="text" id="roleInput" placeholder="Role">
      <button onclick="addUser()">Tambah</button>
    </div>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
      </tr>
      ${data.map(d => `
        <tr>
          <td>${d.id}</td>
          <td>${d.name}</td>
          <td>${d.role}</td>
        </tr>
      `).join("")}
    </table>
  `;

  const renderCard = data => `
    <h2>🧾 Card</h2>
    <div class="flex">
      ${data.map(u => `
        <div class="card">
          <h3>${u.name}</h3>
          <p>${u.role}</p>
        </div>
      `).join("")}
    </div>
  `;

  const renderList = data => `
    <h2>📋 List</h2>
    <ul>
      ${data.map(d => `<li>${d.name} - ${d.role}</li>`).join("")}
    </ul>
  `;

  // =======================
  // LOGIC TAMBAH DATA
  // =======================

  function addUser() {
    const name = document.getElementById("nameInput").value;
    const role = document.getElementById("roleInput").value;

    if (!name || !role) {
      alert("Isi semua field!");
      return;
    }

    users.push({
      id: users.length + 1,
      name,
      role
    });

    navigate("Table"); // refresh tampilan
  }

  // =======================
  // ROUTING
  // =======================

  function navigate(page) {
    document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
    document.getElementById("menu-" + page).classList.add("active");

    let content = "";

    if (page === "Array") content = renderArray(users);
    if (page === "Table") content = renderTable(users);
    if (page === "Card") content = renderCard(users);
    if (page === "List") content = renderList(users);

    document.getElementById("content").innerHTML = content;
  }

  // INIT
  document.getElementById("menu").innerHTML = renderMenu();
  navigate("Array");
</script>

</body>
</html>
