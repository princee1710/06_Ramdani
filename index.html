<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WP — Render Antar Muka</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f4f3ef;--surface:#fff;--border:rgba(0,0,0,0.09);
      --text:#18181b;--muted:#71717a;--accent:#2563eb;--accent-bg:#eff6ff;
      --green-bg:#ecfdf5;--green-text:#065f46;
      --red-bg:#fef2f2;--red-text:#991b1b;
      --amber-bg:#fffbeb;--amber-text:#92400e;
      --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
      --font:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);padding:2rem 1rem 4rem;line-height:1.6}
    .page{max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:2.5rem}
    .page-title{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;padding-bottom:.5rem;border-bottom:.5px solid var(--border)}
    .section-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem}

    /* TABLE */
    #table-container{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
    #table-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:.5px solid var(--border)}
    #table-header span{font-size:14px;font-weight:500}
    .badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;background:var(--accent-bg);color:var(--accent)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{font-size:11px;font-weight:500;color:var(--muted);text-align:left;padding:9px 1.25rem;border-bottom:.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
    tbody tr{border-bottom:.5px solid var(--border);transition:background .1s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--bg)}
    tbody td{padding:10px 1.25rem;vertical-align:middle}
    .mono{font-family:var(--mono);font-size:12px;color:var(--muted)}
    .chip{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:99px}
    .chip-aktif{background:var(--green-bg);color:var(--green-text)}
    .chip-nonaktif{background:var(--red-bg);color:var(--red-text)}
    .chip-pending{background:var(--amber-bg);color:var(--amber-text)}

    /* CARD */
    #card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
    .card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem}
    .card-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;margin-bottom:10px;background:var(--accent-bg);color:var(--accent)}
    .card-name{font-size:14px;font-weight:500;margin-bottom:2px}
    .card-role{font-size:12px;color:var(--muted);margin-bottom:10px}
    .card-email{font-family:var(--mono);font-size:11px;color:var(--muted)}

    /* LIST */
    #list{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;list-style:none}
    #list li{display:flex;align-items:center;gap:12px;padding:11px 1.25rem;border-bottom:.5px solid var(--border);font-size:13.5px;transition:background .1s;cursor:default}
    #list li:last-child{border-bottom:none}
    #list li:hover{background:var(--bg)}
    .list-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .list-info{flex:1}
    .list-title{font-weight:500;font-size:13px}
    .list-sub{font-size:11px;color:var(--muted)}
    .list-arrow{font-size:12px;color:var(--muted)}

    /* MENU */
    #menu{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
    #menu-header{padding:1rem 1.25rem .75rem;border-bottom:.5px solid var(--border);font-size:13px;font-weight:500}
    #menu ul{list-style:none;padding:.5rem 0}
    #menu li a{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;text-decoration:none;color:var(--text);font-size:13.5px;transition:background .1s}
    #menu li a:hover{background:var(--bg)}
    .menu-icon{font-size:16px;width:20px;text-align:center}
    .menu-label{flex:1}
    .menu-badge{font-size:11px;font-weight:500;padding:1px 7px;border-radius:99px;background:var(--red-bg);color:var(--red-text)}
    .menu-divider{height:.5px;background:var(--border);margin:4px 0}
  </style>
</head>
<body>
<div class="page">
  <p class="page-title">WP — Logika Render Antar Muka via Loop</p>

  <!-- KOMPONEN 1: TABLE -->
  <section>
    <p class="section-label">Table — &lt;table id="table"&gt;</p>
    <div id="table-container">
      <div id="table-header">
        <span>Daftar Pengguna</span>
        <span class="badge" id="table-count">— entri</span>
      </div>
      <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </section>

  <!-- KOMPONEN 2: CARD -->
  <section>
    <p class="section-label">Card — &lt;div id="card"&gt;</p>
    <div id="card-grid"></div>
  </section>

  <!-- KOMPONEN 3: LIST -->
  <section>
    <p class="section-label">List — &lt;ul id="list"&gt;</p>
    <ul id="list"></ul>
  </section>

  <!-- KOMPONEN 4: MENU -->
  <section>
    <p class="section-label">Menu — &lt;nav id="menu"&gt;</p>
    <nav id="menu">
      <div id="menu-header">Navigasi</div>
      <ul id="menu-list"></ul>
    </nav>
  </section>
</div>

<script>
  /* ── DATA (DRY — pisah dari markup) ─────────── */
  const DATA_TABLE = [
    { no:1, id:'USR-001', nama:'Ahmad Fauzi',  email:'ahmad@mail.com', status:'aktif' },
    { no:2, id:'USR-002', nama:'Siti Rahayu',  email:'siti@mail.com',  status:'aktif' },
    { no:3, id:'USR-003', nama:'Budi Santoso', email:'budi@mail.com',  status:'nonaktif' },
  ];
  const COL_TABLE = [
    { key:'no',     label:'No',     render: v => v },
    { key:'id',     label:'ID',     render: v => `<span class="mono">${v}</span>` },
    { key:'nama',   label:'Nama',   render: v => v },
    { key:'email',  label:'Email',  render: v => `<span class="mono">${v}</span>` },
    { key:'status', label:'Status', render: v => {
      const cls={aktif:'chip-aktif',nonaktif:'chip-nonaktif',pending:'chip-pending'};
      const lbl={aktif:'Aktif',nonaktif:'Nonaktif',pending:'Pending'};
      return `<span class="chip ${cls[v]||''}">${lbl[v]||v}</span>`;
    }},
  ];
  const DATA_CARD = [
    { nama:'Ahmad Fauzi',  role:'Frontend Dev', email:'ahmad@mail.com', inisial:'AF' },
    { nama:'Siti Rahayu',  role:'UI Designer',  email:'siti@mail.com',  inisial:'SR' },
    { nama:'Budi Santoso', role:'Backend Dev',  email:'budi@mail.com',  inisial:'BS' },
  ];
  const DATA_LIST = [
    { icon:'📁', bg:'#eff6ff', title:'Dokumen',  sub:'12 file' },
    { icon:'🖼️', bg:'#ecfdf5', title:'Gambar',   sub:'48 file' },
    { icon:'🎵', bg:'#fffbeb', title:'Musik',    sub:'7 file'  },
    { icon:'📦', bg:'#fef2f2', title:'Arsip',    sub:'3 file'  },
  ];
  const DATA_MENU = [
    { icon:'🏠', label:'Beranda',    badge:null, divider:false },
    { icon:'👤', label:'Profil',     badge:null, divider:false },
    { icon:'🔔', label:'Notifikasi', badge:'3',  divider:false },
    { icon:'⚙️', label:'Pengaturan', badge:null, divider:true  },
    { icon:'🚪', label:'Keluar',     badge:null, divider:false },
  ];

  /* ── RENDER via for loop / .map() ───────────── */
  function renderTable(data) {
    document.getElementById('table-head').innerHTML =
      COL_TABLE.map(c=>`<th>${c.label}</th>`).join('');
    document.getElementById('table-body').innerHTML =
      data.map(row=>`<tr>${COL_TABLE.map(c=>`<td>${c.render(row[c.key])}</td>`).join('')}</tr>`).join('');
    document.getElementById('table-count').textContent=`${data.length} entri`;
  }

  function renderCard(data) {
    document.getElementById('card-grid').innerHTML =
      data.map(p=>`
        <div class="card">
          <div class="card-avatar">${p.inisial}</div>
          <p class="card-name">${p.nama}</p>
          <p class="card-role">${p.role}</p>
          <p class="card-email">${p.email}</p>
        </div>`).join('');
  }

  function renderList(data) {
    document.getElementById('list').innerHTML =
      data.map(item=>`
        <li>
          <div class="list-icon" style="background:${item.bg}">${item.icon}</div>
          <div class="list-info">
            <p class="list-title">${item.title}</p>
            <p class="list-sub">${item.sub}</p>
          </div>
          <span class="list-arrow">›</span>
        </li>`).join('');
  }

  function renderMenu(data) {
    document.getElementById('menu-list').innerHTML =
      data.map(item=>`
        ${item.divider?'<li><div class="menu-divider"></div></li>':''}
        <li><a href="#">
          <span class="menu-icon">${item.icon}</span>
          <span class="menu-label">${item.label}</span>
          ${item.badge?`<span class="menu-badge">${item.badge}</span>`:''}
        </a></li>`).join('');
  }

  /* ── INIT ────────────────────────────────────── */
  renderTable(DATA_TABLE);
  renderCard(DATA_CARD);
  renderList(DATA_LIST);
  renderMenu(DATA_MENU);
</script>
</body>
</html>
