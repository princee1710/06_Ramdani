<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modular UI Light Theme</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background: #f1f5f9;
    color: #1e293b;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  /* NAV */
  nav {
    background: white;
    padding: 12px 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  nav a {
    margin-right: 20px;
    color: #64748b;
    cursor: pointer;
    text-decoration: none;
  }

  nav a.active {
    color: #0ea5e9;
    font-weight: bold;
  }

  nav a:hover {
    color: #0ea5e9;
  }

  /* SECTION */
  section {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.05);
  }

  /* FORM */
  .form {
    margin-bottom: 15px;
  }

  input {
    padding: 8px;
    margin-right: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
  }

  button {
    padding: 8px 14px;
    background: #0ea5e9;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #0284c7;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
  }

  th, td {
    padding: 12px;
    border-bottom: 1px solid #e2e8f0;
  }

  th {
    background: #f8fafc;
  }

  tr:hover {
    background: #f1f5f9;
  }

  /* CARD */
  .flex {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
  }

  .card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    width: 180px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .card h3 {
    color: #0ea5e9;
  }

  /* LIST */
  ul {
    list-style: none;
  }

  li {
    padding: 10px;
    background: #f8fafc;
    margin-bottom: 6px;
    border-radius: 8px;
  }

  /* ARRAY */
  pre {
    background: #f8fafc;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
    color: #0ea5e9;
  }
</style>
</head>

<body>

<h1>📘 Modular UI (Light Theme)</h1>

<nav id="menu"></nav>
<section id="content"></section>

<script>
  let users = [
    { id: 1, name: "Ramdani", role: "Frontend" },
    { id: 2, name: "Budi", role: "Backend" },
    { id: 3, name: "Siti", role: "UI/UX" }
  ];

  const menuItems = ["Array", "Table", "Card", "List"];

  const renderMenu = () =>
    menuItems.map(item =>
      `<a onclick="navigate('${item}')" id="menu-${item}">${item}</a>`
    ).join("");

  const renderArray = data => `
    <h2>📦 Array</h2>
    <pre>${JSON.stringify(data, null, 2)}</pre>
  `;

  const renderTable = data => `
    <h2>📊 Table</h2>

    <div class="form">
      <input type="text" id="nameInput" placeholder="Nama">
      <input type="text" id="roleInput" placeholder="Role">
      <button onclick="addUser()">Tambah</button>
    </div>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
      </tr>
      ${data.map(d => `
        <tr>
          <td>${d.id}</td>
          <td>${d.name}</td>
          <td>${d.role}</td>
        </tr>
      `).join("")}
    </table>
  `;

  const renderCard = data => `
    <h2>🧾 Card</h2>
    <div class="flex">
      ${data.map(u => `
        <div class="card">
          <h3>${u.name}</h3>
          <p>${u.role}</p>
        </div>
      `).join("")}
    </div>
  `;

  const renderList = data => `
    <h2>📋 List</h2>
    <ul>
      ${data.map(d => `<li>${d.name} - ${d.role}</li>`).join("")}
    </ul>
  `;

  function addUser() {
    const name = document.getElementById("nameInput").value;
    const role = document.getElementById("roleInput").value;

    if (!name || !role) {
      alert("Isi semua field!");
      return;
    }

    users.push({
      id: users.length + 1,
      name,
      role
    });

    navigate("Table");
  }

  function navigate(page) {
    document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
    document.getElementById("menu-" + page).classList.add("active");

    let content = "";

    if (page === "Array") content = renderArray(users);
    if (page === "Table") content = renderTable(users);
    if (page === "Card") content = renderCard(users);
    if (page === "List") content = renderList(users);

    document.getElementById("content").innerHTML = content;
  }

  document.getElementById("menu").innerHTML = renderMenu();
  navigate("Array");
</script>

</body>
</html>
