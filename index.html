<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Modular UI</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    background: #0f172a;
    color: #e2e8f0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  h2 {
    margin: 20px 0 10px;
  }

  /* NAVBAR */
  nav {
    background: rgba(255,255,255,0.05);
    padding: 12px 20px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
  }

  nav a {
    margin-right: 20px;
    color: #94a3b8;
    text-decoration: none;
    transition: 0.3s;
  }

  nav a:hover {
    color: #38bdf8;
  }

  /* CARD */
  .flex {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
  }

  .card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 16px;
    width: 180px;
    backdrop-filter: blur(12px);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  }

  .card h3 {
    margin-bottom: 5px;
    color: #38bdf8;
  }

  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    overflow: hidden;
  }

  th, td {
    padding: 12px;
    text-align: left;
  }

  th {
    background: rgba(255,255,255,0.1);
  }

  tr:hover {
    background: rgba(255,255,255,0.05);
  }

  /* LIST */
  ul {
    list-style: none;
  }

  li {
    padding: 10px;
    margin-bottom: 5px;
    background: rgba(255,255,255,0.05);
    border-radius: 8px;
    transition: 0.2s;
  }

  li:hover {
    background: rgba(56,189,248,0.2);
  }

  /* SECTION BOX */
  section {
    background: rgba(255,255,255,0.03);
    padding: 15px;
    border-radius: 16px;
    margin-bottom: 20px;
  }
</style>
</head>

<body>

<h1>🚀 Modern Dashboard UI</h1>

<nav id="menu"></nav>

<section>
  <h2>📊 Table</h2>
  <div id="table"></div>
</section>

<section>
  <h2>🧾 Cards</h2>
  <div id="card-container" class="flex"></div>
</section>

<section>
  <h2>📋 List</h2>
  <ul id="list"></ul>
</section>

<script>
  // =======================
  // DATA
  // =======================
  const users = [
    { id: 1, name: "Ramdani", role: "Frontend" },
    { id: 2, name: "Budi", role: "Backend" },
    { id: 3, name: "Siti", role: "UI/UX" }
  ];

  const menuItems = ["Dashboard", "Users", "Settings"];

  // =======================
  // COMPONENTS (DRY)
  // =======================

  const renderMenu = items =>
    items.map(i => `<a href="#">${i}</a>`).join("");

  const renderList = data =>
    data.map(d => `<li>${d.name} - ${d.role}</li>`).join("");

  const renderTable = data => `
    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Role</th>
      </tr>
      ${data.map(d => `
        <tr>
          <td>${d.id}</td>
          <td>${d.name}</td>
          <td>${d.role}</td>
        </tr>
      `).join("")}
    </table>
  `;

  const renderCard = user => `
    <div class="card">
      <h3>${user.name}</h3>
      <p>${user.role}</p>
    </div>
  `;

  // =======================
  // RENDER
  // =======================

  document.getElementById("menu").innerHTML = renderMenu(menuItems);
  document.getElementById("list").innerHTML = renderList(users);
  document.getElementById("table").innerHTML = renderTable(users);
  document.getElementById("card-container").innerHTML =
    users.map(renderCard).join("");

</script>

</body>
</html>
