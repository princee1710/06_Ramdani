<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modular UI - DRY</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    nav {
      margin-bottom: 20px;
    }

    nav a {
      margin-right: 15px;
      text-decoration: none;
      font-weight: bold;
      color: black;
    }

    nav a:hover {
      color: blue;
    }

    .flex {
      display: flex;
      gap: 10px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      width: 150px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    table {
      border-collapse: collapse;
      width: 300px;
    }

    th, td {
      padding: 8px;
      text-align: left;
    }

    th {
      background: #f4f4f4;
    }
  </style>
</head>

<body>

  <h1>Modular UI (DRY, Reuse, Scalable)</h1>

  <!-- MENU -->
  <nav id="menu"></nav>

  <!-- TABLE -->
  <section>
    <h2>Table</h2>
    <div id="table"></div>
  </section>

  <!-- CARD -->
  <section>
    <h2>Card</h2>
    <div id="card-container" class="flex"></div>
  </section>

  <!-- LIST -->
  <section>
    <h2>List</h2>
    <ul id="list"></ul>
  </section>

  <script>
    // =======================
    // DATA (ARRAY)
    // =======================
    const users = [
      { id: 1, name: "Ramdani", role: "Frontend" },
      { id: 2, name: "Budi", role: "Backend" },
      { id: 3, name: "Siti", role: "UI/UX" }
    ];

    const menuItems = ["Home", "About", "Contact"];

    // =======================
    // REUSABLE FUNCTIONS
    // =======================

    function renderMenu(items) {
      return items.map(item => `<a href="#">${item}</a>`).join("");
    }

    function renderList(items) {
      return items.map(item => `<li>${item.name}</li>`).join("");
    }

    function renderTable(data) {
      return `
        <table border="1">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Role</th>
          </tr>
          ${data.map(user => `
            <tr>
              <td>${user.id}</td>
              <td>${user.name}</td>
              <td>${user.role}</td>
            </tr>
          `).join("")}
        </table>
      `;
    }

    function renderCard(user) {
      return `
        <div class="card">
          <h3>${user.name}</h3>
          <p>${user.role}</p>
        </div>
      `;
    }

    // =======================
    // RENDER
    // =======================

    document.getElementById("menu").innerHTML = renderMenu(menuItems);
    document.getElementById("list").innerHTML = renderList(users);
    document.getElementById("table").innerHTML = renderTable(users);
    document.getElementById("card-container").innerHTML =
      users.map(renderCard).join("");

  </script>

</body>
</html>
